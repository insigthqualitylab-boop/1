// ========== HOLT‑WINTERS COMPLETO (MULTIPLICATIVO O ADITIVO) ==========
function holtWinters(series, periods = 12, alpha = 0.3, beta = 0.1, gamma = 0.4, model = 'multiplicative', horizon = 8) {
  if (!series || series.length < 2*periods) return holtDouble(series, alpha, beta, horizon);
  const n = series.length;
  let L = Array(n).fill(0);
  let T = Array(n).fill(0);
  let S = Array(n).fill(0);
  for (let p = 0; p < periods; p++) {
    let sum = 0, cnt = 0;
    for (let i = p; i < Math.min(n, 2*periods); i += periods) { sum += series[i]; cnt++; }
    S[p] = sum / cnt;
  }
  const seasonMean = S.slice(0,periods).reduce((a,b)=>a+b,0)/periods;
  for (let p = 0; p < periods; p++) S[p] /= seasonMean;
  L[0] = series[0] / S[0];
  T[0] = (series[periods]/S[periods] - series[0]/S[0]) / periods;
  for (let i = 1; i < n; i++) {
    const s = S[i % periods];
    const lt = L[i-1] + T[i-1];
    const yt = series[i];
    if (model === 'multiplicative') {
      L[i] = alpha * (yt / s) + (1 - alpha) * lt;
      T[i] = beta * (L[i] - L[i-1]) + (1 - beta) * T[i-1];
      S[i] = gamma * (yt / L[i]) + (1 - gamma) * s;
    } else {
      L[i] = alpha * (yt - s) + (1 - alpha) * lt;
      T[i] = beta * (L[i] - L[i-1]) + (1 - beta) * T[i-1];
      S[i] = gamma * (yt - L[i]) + (1 - gamma) * s;
    }
    if (S[i] < 0.1 && model === 'multiplicative') S[i] = 0.1;
  }
  const fitted = Array(n).fill(0);
  for (let i = 0; i < n; i++) {
    const s = S[i % periods];
    fitted[i] = model === 'multiplicative' ? Math.max(0, (L[i] + T[i]) * s) : Math.max(0, L[i] + T[i] + s);
  }
  const forecast = Array(horizon).fill(0);
  const lastL = L[n-1], lastT = T[n-1];
  for (let h = 1; h <= horizon; h++) {
    const idx = n - 1 + h;
    const s = S[idx % periods];
    forecast[h-1] = model === 'multiplicative' ? Math.max(0, (lastL + h * lastT) * s) : Math.max(0, lastL + h * lastT + s);
  }
  return { fitted, forecast, L: lastL, T: lastT, seasonal: S.slice(0,periods), model };
}
function holtDouble(series, alpha = 0.3, beta = 0.1, horizon = 8) {
  if (!series || series.length < 2) return { fitted: [], forecast: [], L: 0, T: 0 };
  let L = series[0], T = series[1] - series[0];
  const fitted = [];
  for (let i = 0; i < series.length; i++) {
    const Lp = L;
    L = alpha * series[i] + (1 - alpha) * (L + T);
    T = beta * (L - Lp) + (1 - beta) * T;
    fitted.push(Math.max(0, Math.round(L + T)));
  }
  const forecast = Array(horizon).fill(0).map((_, m) => Math.max(0, Math.round(L + (m + 1) * T)));
  return { fitted, forecast, L, T };
}
function calcMAPE(actual, fitted) {
  let sum = 0, n = 0;
  for (let i = 0; i < actual.length; i++) if (actual[i] > 0 && fitted[i] != null) { sum += Math.abs(actual[i] - fitted[i]) / actual[i]; n++; }
  return n ? (sum / n) * 100 : 0;
}
function calcStats(arr) {
  const n = arr.length || 1;
  const mean = arr.reduce((a, b) => a + b, 0) / n;
  const std = Math.sqrt(arr.reduce((a, v) => a + (v - mean) ** 2, 0) / Math.max(n - 1, 1));
  return { mean, std };
}
const Z_MAP = { 90: 1.28, 95: 1.65, 97: 1.88, 99: 2.33 };

// ========== DATOS DEMO ==========
function generateDemo() {
  const platforms = ["MercadoLibre", "Amazon", "TikTok Shop"];
  const skus = [
    { sku: "SH-001", nombre: "Shampoo Hidratante 500ml", base: 120, trend: 2, seasonal: [1, .9, .85, .8, .95, 1.1, 1.2, 1.15, 1, 1.05, 1.2, 1.4] },
    { sku: "AC-002", nombre: "Acondicionador Reparador 400ml", base: 85, trend: 1, seasonal: [.9, .85, .8, .9, 1, 1.1, 1.15, 1.1, .95, 1, 1.1, 1.3] },
    { sku: "CR-003", nombre: "Crema Corporal 250g", base: 65, trend: -1, seasonal: [1.2, 1, .8, .75, .7, .8, .9, .95, 1, 1.1, 1.3, 1.5] },
    { sku: "SX-004", nombre: "Sérum Facial Vit-C 30ml", base: 45, trend: 3, seasonal: [1, 1, 1.1, 1.2, 1.1, 1, .9, .9, 1, 1.1, 1.2, 1.1] }
  ];
  const prices = { "SH-001": 280, "AC-002": 220, "CR-003": 180, "SX-004": 350 };
  const shares = [0.45, 0.35, 0.20];
  const records = [];
  const origin = new Date(2025, 0, 6);
  for (let w = 0; w < 24; w++) {
    const d = new Date(origin); d.setDate(d.getDate() + w * 7);
    const month = d.getMonth();
    const fecha = d.toISOString().slice(0,10);
    skus.forEach(({ sku, nombre, base, trend, seasonal }) => {
      platforms.forEach((plataforma, pi) => {
        const factor = seasonal[month];
        const noise = 0.8 + Math.random() * 0.4;
        const units = Math.max(1, Math.round(base * shares[pi] * factor * noise + trend * w * shares[pi]));
        const precio = prices[sku];
        records.push({ fecha, semana: w+1, plataforma, sku, producto: nombre, unidades: units, precio, ingreso: units * precio });
      });
    });
  }
  return records;
}

// ========== ANALYTICS ==========
function computeAnalytics(data, params) {
  if (!data?.length) return null;
  const { alpha, beta, gamma, model, lt, sl } = params;
  const z = Z_MAP[sl] || 1.65;
  const skus = [...new Set(data.map(r => r.sku))];
  const semanas = [...new Set(data.map(r => r.semana))].sort((a,b)=>a-b);
  const fechaOf = Object.fromEntries(data.map(r => [r.semana, r.fecha]));
  const skuMeta = {};
  skus.forEach((sku, si) => {
    const rows = data.filter(r => r.sku === sku);
    const nombre = rows[0]?.producto || sku;
    const byWeek = {};
    rows.forEach(r => { byWeek[r.semana] = (byWeek[r.semana] || 0) + r.unidades; });
    const series = semanas.map(s => byWeek[s] || 0);
    const hw = holtWinters(series, 12, alpha, beta, gamma, model, 8);
    const fitted = hw.fitted;
    const forecast = hw.forecast;
    const mapeVal = calcMAPE(series, fitted);
    const { mean, std } = calcStats(series);
    const ss = Math.ceil(z * std * Math.sqrt(lt));
    const rop = Math.ceil(mean * lt + ss);
    skuMeta[sku] = { nombre, series, fitted, forecast, mapeVal, mean, std, ss, rop, color: C.SKU[si % 4], seasonal: hw.seasonal };
  });
  const weeklyChart = semanas.map((s, i) => {
    const row = { semana: `S${s}`, fecha: fechaOf[s] };
    skus.forEach(sku => { row[sku] = skuMeta[sku].series[i] || 0; });
    row.total = skus.reduce((a,sku) => a + (row[sku]||0), 0);
    row.fitted = Math.round(skus.reduce((a,sku) => a + (skuMeta[sku].fitted[i]||0), 0));
    return row;
  });
  const lastSem = Math.max(...semanas);
  const forecastChart = Array.from({ length: 8 }, (_, i) => {
    const row = { semana: `S${lastSem + i + 1}` };
    skus.forEach(sku => { row[sku] = skuMeta[sku].forecast[i] || 0; });
    row.total = skus.reduce((a,sku) => a + (row[sku]||0), 0);
    return row;
  });
  const byPlatform = {};
  data.forEach(r => { byPlatform[r.plataforma] = (byPlatform[r.plataforma] || 0) + r.unidades; });
  const platformChart = Object.entries(byPlatform).sort((a,b)=>b[1]-a[1]).map(([name, unidades]) => ({ name, unidades, fill: C.PLT[name] || C.PLT.Default }));
  const totalUnidades = data.reduce((a,r) => a + r.unidades, 0);
  const totalIngreso = data.reduce((a,r) => a + r.ingreso, 0);
  const avgMAPE = Object.values(skuMeta).reduce((a,d) => a + d.mapeVal, 0) / skus.length;
  const nextWeek = Math.round(skus.reduce((a,sku) => a + (skuMeta[sku].forecast[0]||0), 0));
  const li = semanas.length-1, pi = semanas.length-2;
  const lastTotal = skus.reduce((a,sku) => a + (skuMeta[sku].series[li]||0), 0);
  const prevTotal = skus.reduce((a,sku) => a + (skuMeta[sku].series[pi]||0), 0);
  const deltaWeek = prevTotal ? (lastTotal - prevTotal)/prevTotal*100 : 0;
  return { skus, semanas, skuMeta, weeklyChart, forecastChart, platformChart, totalUnidades, totalIngreso, avgMAPE, nextWeek, deltaWeek, lastSem };
}

  const [stockData, setStockData] = useState(() => loadSaved("stockData", null));
  const [params, setParams] = useState(() => loadSaved("params", { alpha: 0.3, beta: 0.1, gamma: 0.4, model: "multiplicative", lt: 2, sl: 95 }));

  useEffect(() => { saveData("params", params); }, [params]);
  useEffect(() => { saveData("log", log.slice(0,30)); }, [log]);

  const analytics = useMemo(() => computeAnalytics(ventasData, params), [ventasData, params]);

  const handleCSVUpload = useCallback(e => {
    const file = e.target?.files?.[0];
    if (!file) return;
    Papa.parse(file, { header: true, skipEmptyLines: true, complete: ({ data }) => {
      const mapped = data.flatMap((row, i) => {
        const fecha = row.fecha || row.date || row.Fecha || row["Fecha de pedido"] || row["order_date"] || row["Date"] || "";
        const plataforma = row.plataforma || row.platform || row.Plataforma || row.canal || row.Channel || "Importado";
        const sku = row.sku || row.SKU || row["Item ID"] || row["ASIN"] || row.codigo || `SKU-${i}`;
        const producto = row.producto || row.Producto || row["Item Title"] || row["Product Name"] || row.nombre || sku;
        const unidades = parseInt(row.unidades || row.Unidades || row.qty || row.quantity || row["Units Ordered"] || row.Quantity || 0);
        const precio = parseFloat(row.precio || row.Precio || row["Item Price"] || row["Unit Price"] || row.price || 0);
        if (unidades <= 0 || !fecha) return [];
        const d = new Date(fecha);
        const sem = isNaN(d.getTime()) ? i+1 : Math.ceil((d - new Date(d.getFullYear(),0,1)) / (7*86400000));
        return [{ fecha, semana: Math.max(1,sem), plataforma, sku, producto, unidades, precio, ingreso: unidades * precio }];
      });
      if (mapped.length) {
        setVentasData(prev => [...prev, ...mapped]);
        setLog(prev => [`✓ ${mapped.length} registros importados de "${file.name}"`, ...prev].slice(0,30));
      } else {
        setLog(prev => [`⚠ Sin registros válidos en "${file.name}". Verifica columnas: fecha, sku, unidades`, ...prev].slice(0,30));
      }
      if (e.target) e.target.value = "";
    }});
  }, []);

  const handleStockUpload = useCallback(e => {
    const file = e.target?.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = evt => {
      try {
        const wb = XLSX.read(evt.target.result, { type: "binary" });
        const stock = {};
        wb.SheetNames.forEach(name => {
          const data = XLSX.utils.sheet_to_json(wb.Sheets[name], { defval: "" });
          const lc = name.toLowerCase();
          if (lc.includes("insum") || lc.includes("mater") || lc.includes("raw")) stock.insumos = data;
          else if (lc.includes("proces") || lc.includes("wip")) stock.wip = data;
          else if (lc.includes("termin") || lc.includes("finish") || lc.includes("pt")) stock.terminado = data;
          else stock[name] = data;
        });
        if (!stock.insumos && !stock.wip && !stock.terminado) {
          wb.SheetNames.forEach((name,i) => {
            const data = XLSX.utils.sheet_to_json(wb.Sheets[name], { defval: "" });
            if (i===0) stock.insumos = data;
            if (i===1) stock.wip = data;
            if (i===2) stock.terminado = data;
          });
        }
        setStockData(stock);
        setLog(prev => [`✓ Inventario: "${file.name}" (${wb.SheetNames.join(", ")})`, ...prev].slice(0,30));
      } catch (err) {
        setLog(prev => [`✗ Error al leer "${file.name}": ${err.message}`, ...prev].slice(0,30));
      }
    };
    reader.readAsBinaryString(file);
    if (e.target) e.target.value = "";
  }, []);

  const isMobile = window.innerWidth < 700;
  return React.createElement("div", { style: { background: C.bg, height: "100vh", color: C.text, fontFamily: "'Courier New',Courier,monospace", display: "flex", flexDirection: "column", fontSize: 12, overflow: "hidden" } },
    React.createElement("div", { style: { background: C.surf, borderBottom: `1px solid ${C.border}`, padding: "10px 16px", display: "flex", justifyContent: "space-between", alignItems: "center", flexShrink: 0 } },
      React.createElement("div", null,
        React.createElement("span", { style: { color: C.amber, fontSize: 14, fontWeight: 700, letterSpacing: ".04em" } }, "DEMAND·OS"),
        React.createElement("span", { style: { color: C.muted, fontSize: 8, marginLeft: 8, letterSpacing: ".1em" } }, "SUPPLY CHAIN")
      ),
      React.createElement("div", { style: { display: "flex", gap: 6, alignItems: "center" } },
        analytics && React.createElement(React.Fragment, null,
          React.createElement(Badge, { color: C.green }, analytics.skus.length, " SKUs"),
          React.createElement(Badge, { color: C.amber }, "MAPE ", analytics.avgMAPE.toFixed(1), "%")
        ),
        isMobile && React.createElement("button", { onClick: () => setNavOpen(!navOpen), style: { background: C.card, border: `1px solid ${C.border}`, color: C.text, borderRadius: 4, padding: "4px 8px", cursor: "pointer", fontSize: 14, fontFamily: "inherit" } }, "☰")
      )
    ),
    React.createElement("div", { style: { display: "flex", flex: 1, overflow: "hidden" } },
      (!isMobile || navOpen) && React.createElement("div", { style: { width: isMobile ? "100%" : 180, background: C.surf, borderRight: `1px solid ${C.border}`, display: "flex", flexDirection: "column", flexShrink: 0, position: isMobile ? "absolute" : "relative", zIndex: isMobile ? 100 : 1, height: isMobile ? "calc(100vh - 42px)" : "100%", overflowY: "auto" } },
        React.createElement("nav", { style: { flex: 1, padding: "10px 0" } }, NAV.map(({ id, label, icon }) => 
          React.createElement("button", { key: id, onClick: () => { setView(id); setNavOpen(false); }, style: { display: "flex", alignItems: "center", gap: 10, width: "100%", padding: "12px 18px", background: view === id ? `${C.amber}12` : "transparent", borderLeft: view === id ? `2px solid ${C.amber}` : "2px solid transparent", border: "none", borderTop: "none", borderRight: "none", borderBottom: "none", color: view === id ? C.amber : C.muted, cursor: "pointer", fontSize: 12, textAlign: "left" } }, React.createElement("span", { style: { fontSize: 14 } }, icon), label)
        )),
        React.createElement("div", { style: { padding: "10px 18px", borderTop: `1px solid ${C.border}` } },
          React.createElement("div", { style: { color: C.muted, fontSize: 8, lineHeight: 1.9 } },
            React.createElement("div", { style: { color: C.amber } }, "v2.0 · Holt‑Winters"),
            React.createElement("div", null, ventasData.length.toLocaleString(), " registros"),
            React.createElement("div", null, analytics?.skus?.length || 0, " SKUs · ", analytics?.semanas?.length || 0, " sem."),
            stockData && React.createElement("div", { style: { color: C.green } }, "📦 Stock OK")
          ),
          ventasData.length > 0 && React.createElement("button", { onClick: () => { setVentasData([]); setLog(["↻ Datos eliminados.", ...log].slice(0,30)); }, style: { marginTop: 8, width: "100%", background: `${C.red}15`, border: `1px solid ${C.red}40`, color: C.red, borderRadius: 4, padding: "4px 0", cursor: "pointer", fontSize: 9, fontFamily: "inherit" } }, "Limpiar datos")
        )
      ),
      React.createElement("main", { style: { flex: 1, overflowY: "auto", padding: "16px 20px" } },
        view === "dashboard" && React.createElement(Dashboard, { analytics, stockData }),
        view === "import" && React.createElement(ImportView, { onCSVUpload: handleCSVUpload, onStockUpload: handleStockUpload, log }),
        view === "inventory" && React.createElement(InventoryView, { stockData, analytics }),
        view === "forecast" && React.createElement(ForecastView, { analytics, params, setParams }),
        view === "manual" && React.createElement(ManualView, null)
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App, null));
</script>
